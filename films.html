<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filmboxd · My Films</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #1a1e24; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #ccd9e6; line-height: 1.5; padding-bottom: 40px; min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; width: 100%; flex: 1; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #2c3440; margin-bottom: 24px; }
    .logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: #fff; cursor: pointer; }
    .logo .film { color: #fff; } .logo .boxd { color: #3cc693; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #9ab; text-decoration: none; font-weight: 500; font-size: 15px; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .page-title { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-title h1 { font-size: 28px; font-weight: 700; color: #fff; }
    .add-link { background-color: #3cc693; color: #fff; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .filter-select, .sort-order-btn { background: #2c3440; color: #fff; border: 1px solid #3c4a5a; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
    .sort-order-btn { cursor: pointer; }
    .films-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .film-card { position: relative; background: transparent; cursor: pointer; transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
    .film-card:hover { transform: translateY(-4px); }
    .delete-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; z-index: 10; }
    .delete-btn.visible { display: flex; }
    .poster-frame { width: 100%; aspect-ratio: 2/3; background: #2c3440; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #567; font-size: 12px; border: 1px solid #3c4a5a; margin-bottom: 8px; position: relative; }
    .watched-indicator { position: absolute; top: 6px; left: 6px; color: #3cc693; font-size: 14px; }
    .film-title { font-size: 14px; font-weight: 500; color: #fff; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .film-rating { font-size: 12px; color: #3cc693; text-align: center; }
    .empty-message { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #9ab; font-size: 16px; background: #14181c; border-radius: 16px; }
    .footer { margin-top: 60px; text-align: center; color: #567; font-size: 12px; }
    .devaccess-link { text-align: center; margin-top: 16px; }
    .devaccess-link a { color: #567; text-decoration: underline; font-size: 12px; }
    @media (min-width: 601px) {
      .films-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
    @media (max-width: 600px) {
      .container { padding: 0 16px; }
      .top-bar { padding: 12px 0; margin-bottom: 16px; }
      .logo { font-size: 22px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 13px; }
      .page-title h1 { font-size: 24px; }
      .films-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="logo" onclick="window.location.href='index.html'"><span class="film">Film</span><span class="boxd">boxd</span></div>
      <div class="nav-links">
        <a href="films.html">Films</a>
        <a href="#">My Lists</a>
        <a href="#">Account</a>
      </div>
    </div>

    <div class="page-title">
      <h1>My Films</h1>
      <a href="index.html" class="add-link">+ Add Film</a>
    </div>

    <div class="filter-bar">
      <select id="sortSelect" class="filter-select">
        <option value="date">Date Added</option>
        <option value="year">Year</option>
        <option value="director">Director</option>
        <option value="rating">Rating</option>
        <option value="watched">Watched First</option>
      </select>
      <button id="sortOrderBtn" class="sort-order-btn">↓ Desc</button>
    </div>

    <div id="filmsGrid" class="films-grid"></div>
    <div class="footer">
      Filmboxd — your personal movie diary.
      <div class="devaccess-link"><a href="#" id="devAccessLink">DevAccess</a></div>
    </div>
  </div>

  <script>
    (function() {
      const DEV_PASSWORD = 'blondstepmom';
      const STORAGE_KEY = 'filmboxd_devAccess';
      const FILMS_KEY = 'filmboxd_films';
      let sortOrder = 'desc';
      const sortSelect = document.getElementById('sortSelect');
      const sortOrderBtn = document.getElementById('sortOrderBtn');

      // DevAccess
      document.getElementById('devAccessLink').addEventListener('click', (e) => {
        e.preventDefault();
        const granted = localStorage.getItem(STORAGE_KEY) === 'true';
        if (granted) {
          localStorage.removeItem(STORAGE_KEY);
          loadFilms();
          alert('Dev access revoked.');
        } else {
          const pwd = prompt('Enter developer password:');
          if (pwd === DEV_PASSWORD) {
            localStorage.setItem(STORAGE_KEY, 'true');
            loadFilms();
            alert('Dev access granted.');
          } else if (pwd !== null) alert('Incorrect password.');
        }
      });

      function sortFilms(films, sortBy, order) {
        let sorted = [...films];
        if (sortBy === 'year') {
          sorted.sort((a,b) => (b.year || '0').localeCompare(a.year || '0'));
        } else if (sortBy === 'director') {
          sorted.sort((a,b) => (a.director || '').localeCompare(b.director || ''));
        } else if (sortBy === 'rating') {
          sorted.sort((a,b) => (b.rating || 0) - (a.rating || 0));
        } else if (sortBy === 'watched') {
          sorted.sort((a,b) => (b.watched ? 1 : 0) - (a.watched ? 1 : 0));
        }
        if (order === 'asc') sorted.reverse();
        return sorted;
      }

      function loadFilms() {
        const films = JSON.parse(localStorage.getItem(FILMS_KEY)) || [];
        const devAccess = localStorage.getItem(STORAGE_KEY) === 'true';
        const grid = document.getElementById('filmsGrid');
        const sorted = sortFilms(films, sortSelect.value, sortOrder);
        
        if (sorted.length === 0) {
          grid.innerHTML = '<div class="empty-message">🎬 No films yet. <a href="index.html" style="color:#3cc693;">Add your first film</a>.</div>';
          return;
        }

        grid.innerHTML = sorted.map(film => {
          const rating = film.rating || 0;
          const starsDisplay = rating > 0 ? '★'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '') : '';
          return `
            <div class="film-card" data-id="${film.id}">
              <button class="delete-btn ${devAccess ? 'visible' : ''}" data-id="${film.id}" title="Delete">✕</button>
              <a href="movie.html?id=${film.id}" style="text-decoration:none; color:inherit; display:block;">
                <div class="poster-frame">
                  ${film.watched ? `<svg class="watched-indicator" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3cc693" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>` : ''}
                  🎬
                </div>
                <div class="film-title">${film.title}</div>
                ${starsDisplay ? `<div class="film-rating">${starsDisplay}</div>` : ''}
              </a>
            </div>
          `;
        }).join('');

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const id = btn.dataset.id;
            if (confirm('Remove this film?')) {
              let films = JSON.parse(localStorage.getItem(FILMS_KEY)) || [];
              films = films.filter(f => f.id !== id);
              localStorage.setItem(FILMS_KEY, JSON.stringify(films));
              loadFilms();
            }
          });
        });
      }

      sortSelect.addEventListener('change', loadFilms);
      sortOrderBtn.addEventListener('click', () => {
        sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
        sortOrderBtn.textContent = sortOrder === 'desc' ? '↓ Desc' : '↑ Asc';
        loadFilms();
      });
      
      loadFilms();
    })();
  </script>
</body>
</html>
